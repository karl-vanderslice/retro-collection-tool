site_name: retro-collection-tool
site_description: Igir wrapper for curated ROMM libraries
site_url: https://karl-vanderslice.github.io/retro-collection-tool/
repo_name: karl-vanderslice/retro-collection-tool
repo_url: https://github.com/karl-vanderslice/retro-collection-tool
edit_uri: edit/master/docs/

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: blue grey
      accent: light blue

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Configuration: configuration.md
  - Commands: commands.md
  - RomVault Arcade Workflow: workflow-romvault-arcade.md
  - Architecture: architecture.md
  - TODO: todo.md
