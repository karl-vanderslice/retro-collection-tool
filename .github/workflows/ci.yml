name: CI

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Enable Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Format Check
        run: |
          nix shell nixpkgs#just -c just fmt
          git diff --exit-code

      - name: Lint
        run: nix shell nixpkgs#just -c just lint

      - name: Test
        run: nix shell nixpkgs#just -c just test

      - name: Build
        run: nix shell nixpkgs#just -c just build

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: retro-collection-tool-linux-amd64
          path: bin/retro-collection-tool
          if-no-files-found: error

  docs-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Enable Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build docs
        run: nix shell nixpkgs#just -c just docs-build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
