name: CI

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Enable Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Format Check
        run: |
          nix shell nixpkgs#just -c just fmt
          git diff --exit-code

      - name: Lint
        run: nix shell nixpkgs#just -c just lint

      - name: Test
        run: nix shell nixpkgs#just -c just test

      - name: Build
        run: nix shell nixpkgs#just -c just build

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: retro-collection-tool-linux-amd64
          path: bin/retro-collection-tool
          if-no-files-found: error

  docs-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Enable Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Build docs
        run: nix shell nixpkgs#just -c just docs-build

      - name: Warn when Cloudflare deploy is skipped
        if: ${{ secrets.CLOUDFLARE_API_TOKEN == '' || secrets.CLOUDFLARE_ACCOUNT_ID == '' || secrets.CLOUDFLARE_PAGES_PROJECT == '' }}
        run: |
          echo "::warning::Skipping Cloudflare Pages deploy because one or more Cloudflare deploy secrets are not configured."

      - name: Deploy to Cloudflare Pages
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' && secrets.CLOUDFLARE_PAGES_PROJECT != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
