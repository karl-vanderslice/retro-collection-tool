site_name: retro-collection-tool
site_description: Igir wrapper for curated ROMM libraries
site_url: https://karl-vanderslice.github.io/retro-collection-tool/
repo_name: karl-vanderslice/retro-collection-tool
repo_url: https://github.com/karl-vanderslice/retro-collection-tool
edit_uri: edit/master/docs/

theme:
  name: material
  language: en
  logo: assets/images/gamepad-logo.svg
  favicon: assets/images/favicon.svg
  font:
    text: Chakra Petch
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
      primary: blue grey
      accent: light blue
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
      primary: blue grey
      accent: lime

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - assets/stylesheets/extra.css

nav:
  - Home: index.md
  - Configuration: configuration.md
  - Commands: commands.md
  - RomVault Arcade Workflow: workflow-romvault-arcade.md
  - Architecture: architecture.md
  - TODO: todo.md
