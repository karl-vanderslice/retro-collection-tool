<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Retro Collection Tool Icon</title>
  <desc id="desc">A retro game cartridge representing ROM collection management.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="cart" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)"/>

  <!-- Cartridge body -->
  <rect x="128" y="100" width="256" height="312" rx="16" fill="#1e293b" stroke="url(#cart)" stroke-width="10"/>

  <!-- Label area -->
  <rect x="160" y="130" width="192" height="140" rx="8" fill="#0b1220" stroke="#f59e0b" stroke-width="6"/>

  <!-- Label lines -->
  <g stroke="#f59e0b" stroke-width="3" opacity="0.7">
    <line x1="180" y1="170" x2="332" y2="170"/>
    <line x1="180" y1="190" x2="300" y2="190"/>
    <line x1="180" y1="210" x2="320" y2="210"/>
    <line x1="180" y1="230" x2="260" y2="230"/>
  </g>

  <!-- Connector pins at bottom -->
  <g fill="#d97706">
    <rect x="168" y="360" width="24" height="32" rx="4"/>
    <rect x="204" y="360" width="24" height="32" rx="4"/>
    <rect x="244" y="360" width="24" height="32" rx="4"/>
    <rect x="284" y="360" width="24" height="32" rx="4"/>
    <rect x="320" y="360" width="24" height="32" rx="4"/>
  </g>

  <!-- Grip notch -->
  <rect x="216" y="80" width="80" height="36" rx="8" fill="#0b1220" stroke="url(#cart)" stroke-width="8"/>
</svg>
